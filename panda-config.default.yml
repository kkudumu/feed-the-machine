# Panda Skills Configuration
# Edit this file or use /panda-config to modify settings

# Model profiles control which model is used at each stage
# Options: opus, sonnet, haiku, inherit (use session default)
profile: balanced  # quality | balanced | budget | custom | inherit

profiles:
  quality:
    planning: opus      # brainstorm, research, plan generation
    execution: opus     # agent task implementation
    review: sonnet      # audit, debug review, council synthesis

  balanced:
    planning: opus
    execution: sonnet
    review: sonnet

  budget:
    planning: sonnet
    execution: sonnet
    review: haiku

  inherit:
    planning: inherit
    execution: inherit
    review: inherit

  custom:
    planning: opus
    execution: sonnet
    review: haiku

# Execution preferences
execution:
  max_parallel_agents: 5          # max agents dispatched simultaneously
  auto_audit: true                # run panda-audit after each executor task
  progress_tracking: true         # write PROGRESS.md during execution

# Skill enable/disable — set enabled: false to prevent panda-mind from routing to a skill
skills:
  panda-brainstorm: { enabled: true }
  panda-executor: { enabled: true }
  panda-debug: { enabled: true }
  panda-audit: { enabled: true }
  panda-council: { enabled: true }
  panda-codex-gate: { enabled: true }
  panda-intent: { enabled: true }
  panda-diagram: { enabled: true }
  panda-browse: { enabled: true }
  panda-pause: { enabled: true }
  panda-resume: { enabled: true }
  panda-upgrade: { enabled: true }
  panda-retro: { enabled: true }
  panda-config: { enabled: true }
  panda-git: { enabled: true }
  panda-mind: { enabled: true }

# Session management
session:
  auto_pause_on_exit: false       # automatically save state when conversation ends
  state_retention_days: 7         # archive states older than this
