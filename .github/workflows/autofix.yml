name: Claude Auto-Fix

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  autofix:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Get CI failure logs
        id: logs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FAILED_LOG=$(gh run view ${{ github.event.workflow_run.id }} --log-failed 2>/dev/null | head -300 || echo "Could not fetch logs")
          echo "logs<<EOFLOG" >> "$GITHUB_OUTPUT"
          echo "$FAILED_LOG" >> "$GITHUB_OUTPUT"
          echo "EOFLOG" >> "$GITHUB_OUTPUT"

      - name: Run Claude Code to fix failures
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            The CI workflow for this repo just failed. Here are the failure logs:

            ```
            ${{ steps.logs.outputs.logs }}
            ```

            Your job:
            1. Read the failure logs and identify every distinct error
            2. Fix each error in the source files
            3. Do NOT modify the CI workflow files (.github/workflows/) — fix the code that CI is validating
            4. After fixing, run the same validation commands locally to verify:
               - `bash tests/validate-skills.sh`
               - `bash tests/structural/test-event-crossrefs.sh`
               - `node tests/validate-events.mjs`
               - `node tests/validate-blackboard.mjs`
               - `bash tests/structural/test-skill-frontmatter.sh`
               - `bash tests/structural/test-json-schemas.sh`
               - `bash tests/structural/test-no-hardcoded-paths.sh`
               - `node tests/runtime/test-ftm-runtime.mjs`
            5. Only commit files that fix actual CI errors — no unrelated changes
          allowed_tools: |
            Read
            Edit
            Write
            Glob
            Grep
            Bash
          timeout_minutes: 10
          direct_commit: false

      - name: Create fix PR
        if: steps.claude.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="autofix/ci-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "fix(ci): auto-fix CI failures from run #${{ github.event.workflow_run.run_number }}"
          git push origin "$BRANCH"
          gh pr create \
            --title "fix(ci): auto-fix CI failures" \
            --body "$(cat <<'EOF'
          ## Summary
          - Automated fix for CI failures from workflow run #${{ github.event.workflow_run.run_number }}
          - Triggered by [`${{ github.event.workflow_run.head_commit.message }}`](${{ github.event.workflow_run.html_url }})

          ## Review
          Please verify these changes are correct before merging.

          🤖 Generated by Claude Code auto-fix workflow
          EOF
          )" \
            --base main \
            --head "$BRANCH"
